services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookstore}
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
    volumes:
      - bookstore-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookstore}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-ghcr.io/automatica-cluj/isp-bookstore-2026-complete:latest}
    pull_policy: ${PULL_POLICY:-always}
    container_name: bookstore-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
    expose:
      - "8090"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: bookstore-caddy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  bookstore-data:
  caddy-data:
  caddy-config:
