server:
  port: 8090
  error:
    include-message: always

spring:
  application:
    name: bookstore-api

  datasource:
    url: jdbc:h2:mem:bookstore
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

jwt:
  secret: dGhpc0lzQVNlY3JldEtleUZvckpXVFNpZ25pbmdUaGF0SXNMb25nRW5vdWdo
  expiration-ms: 3600000
