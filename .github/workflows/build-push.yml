name: Release and Publish

# Trunk-based: everything ships from `main`. On every push to `main`,
# semantic-release decides whether the commits since the last tag warrant a
# new version (feat → minor, fix/perf/refactor → patch, breaking → major).
# The Docker image is always built and pushed; it gets a `v<version>` tag only
# when a release is actually cut.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Release and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: write        # semantic-release pushes the release commit + tag
      packages: write        # push image to GHCR
      issues: write          # semantic-release release comments
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Runs semantic-release once. It analyses the commits, and on a release it
      # bumps pom.xml (via the exec prepareCmd), updates CHANGELOG.md, creates the
      # git tag + GitHub release, and pushes the `chore(release): X.Y.Z [skip ci]`
      # commit. The bumped pom.xml stays in the workspace for the image build below.
      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version
        id: ver
        run: |
          if [ "${{ steps.semrel.outputs.new_release_published }}" = "true" ]; then
            VERSION="${{ steps.semrel.outputs.new_release_version }}"
          else
            # No release this push — tag the image with whatever pom.xml currently holds.
            VERSION=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Image version: $VERSION (released: ${{ steps.semrel.outputs.new_release_published }})"

      # Build the JAR natively on the runner (fast, no emulation). The artifact
      # is architecture-independent, so the multi-arch image below just copies it.
      - name: Build application JAR
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.ver.outputs.version }},enable=${{ steps.semrel.outputs.new_release_published == 'true' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Summary
        run: |
          {
            echo "### Image published 🐳"
            echo ""
            echo "**Version:** \`v${{ steps.ver.outputs.version }}\`"
            echo "**New release created:** \`${{ steps.semrel.outputs.new_release_published }}\`"
            echo "**Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Pull:**"
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
