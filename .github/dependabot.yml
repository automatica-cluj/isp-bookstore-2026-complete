version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - java
    commit-message:
      prefix: chore
      include: scope
    # Skip major bumps (e.g. Spring Boot 3.x → 4.x) — they need a deliberate,
    # reviewed upgrade, not an auto-PR. Minor/patch (incl. security) still flow.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    # Skip major base-image bumps — review those by hand.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    # Skip major action bumps (e.g. actions/setup-java v4 → v5) — review by hand.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
